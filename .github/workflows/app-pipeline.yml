name: Maven App Pipeline

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Bump patch version
        run: |
          mvn build-helper:parse-version versions:set \
            -DnewVersion='${parsedVersion.majorVersion}.${parsedVersion.minorVersion}.${parsedVersion.nextIncrementalVersion}' \
            -DgenerateBackupPoms=false

      - name: Commit bumped version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "Bump patch version [skip ci]"
          git push

      - name: Dockerhub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build and push docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: striumvar/simple-java-maven-app:latest

      - name: Verify pushed image
        run: |
          docker pull striumvar/simple-java-maven-app:latest
          OUTPUT=$(docker run --rm striumvar/simple-java-maven-app:latest)
          echo "Container output: $OUTPUT"
          if [ "$OUTPUT" != "Hello World!" ]; then
            echo "Verification failed: unexpected output"
            exit 1
          fi
