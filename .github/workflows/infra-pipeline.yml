name: Maven App Pipeline

on:
  push:
    branches: [AWS-Infrastructure]

permissions:
  contents: write

jobs:
  aws-infra:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Log in to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin 235527546068.dkr.ecr.us-east-1.amazonaws.com

      - name: Build image
        run: docker build -t 235527546068.dkr.ecr.us-east-1.amazonaws.com/simple-java-maven-app:latest .

      - name: Push to ECR
        run: docker push 235527546068.dkr.ecr.us-east-1.amazonaws.com/simple-java-maven-app:latest

      - name: Deploy and verify
        run: |
          docker pull 235527546068.dkr.ecr.us-east-1.amazonaws.com/simple-java-maven-app:latest
          OUTPUT=$(docker run --rm 235527546068.dkr.ecr.us-east-1.amazonaws.com/simple-java-maven-app:latest)
          echo "Container output: $OUTPUT"
          if echo "$OUTPUT" | grep -q "Hello World"; then
            echo "Verification passed"
          else
            echo "Verification failed: unexpected output"
            exit 1
          fi
